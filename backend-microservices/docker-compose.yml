version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: digiqual-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["postgres", "-c", "shared_buffers=128MB", "-c", "work_mem=4MB", "-c", "maintenance_work_mem=64MB"]
    mem_limit: 512m

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: digiqual-auth-service
    environment:
      SERVER_PORT: 8091
      DB_URL: jdbc:postgresql://postgres:5432/digiqual_auth_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-with-a-secure-env-value}
      APP_SEED_ENABLED: "true"
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m"
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: digiqual-admin-service
    environment:
      SERVER_PORT: 8092
      DB_URL: jdbc:postgresql://postgres:5432/digiqual_admin_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-with-a-secure-env-value}
      APP_SEED_ENABLED: "true"
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m"
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m

  partner-service:
    build:
      context: ./partner-service
      dockerfile: Dockerfile
    container_name: digiqual-partner-service
    environment:
      SERVER_PORT: 8093
      DB_URL: jdbc:postgresql://postgres:5432/digiqual_partner_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-with-a-secure-env-value}
      APP_SEED_ENABLED: "true"
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m"
    ports:
      - "8093:8093"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m

  student-service:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    container_name: digiqual-student-service
    environment:
      SERVER_PORT: 8094
      DB_URL: jdbc:postgresql://postgres:5432/digiqual_student_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-with-a-secure-env-value}
      APP_SEED_ENABLED: "true"
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m"
    ports:
      - "8094:8094"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: digiqual-gateway-service
    environment:
      SERVER_PORT: 8090
      AUTH_SERVICE_URL: http://auth-service:8091
      ADMIN_SERVICE_URL: http://admin-service:8092
      PARTNER_SERVICE_URL: http://partner-service:8093
      STUDENT_SERVICE_URL: http://student-service:8094
      JWT_SECRET: ${JWT_SECRET:-replace-this-secret-with-a-secure-env-value}
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx128m -XX:+UseSerialGC -XX:MaxMetaspaceSize=96m"
    ports:
      - "8090:8090"
    depends_on:
      - auth-service
      - admin-service
      - partner-service
      - student-service
    mem_limit: 192m

  frontend:
    profiles: ["full"]
    image: node:20-alpine
    container_name: digiqual-frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_GATEWAY_BASE_URL: http://localhost:8090/api
      VITE_AUTH_API_BASE_URL: http://localhost:8091/api
      VITE_ADMIN_API_BASE_URL: http://localhost:8092/api
      VITE_PARTNER_API_BASE_URL: http://localhost:8093/api
      VITE_STUDENT_API_BASE_URL: http://localhost:8094/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - gateway-service
    mem_limit: 384m

volumes:
  postgres_data:
  frontend_node_modules:
