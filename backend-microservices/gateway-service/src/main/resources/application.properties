# Server Configuration
server.port=${SERVER_PORT:8090}

# Application Name
spring.application.name=gateway-service

# Upstream service URLs
services.auth.url=${AUTH_SERVICE_URL:http://localhost:8091}
services.admin.url=${ADMIN_SERVICE_URL:http://localhost:8092}
services.partner.url=${PARTNER_SERVICE_URL:http://localhost:8093}
services.student.url=${STUDENT_SERVICE_URL:http://localhost:8094}

# Gateway routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${services.auth.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=admin-service
spring.cloud.gateway.routes[1].uri=${services.admin.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[2].id=partner-service
spring.cloud.gateway.routes[2].uri=${services.partner.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/partner/**

spring.cloud.gateway.routes[3].id=student-service
spring.cloud.gateway.routes[3].uri=${services.student.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/student/**
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST

# CORS for frontend
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:*,http://127.0.0.1:*,https://*.trycloudflare.com,https://*.loca.lt
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

# Edge security
jwt.secret=${JWT_SECRET:replace-this-secret-with-a-secure-env-value}
gateway.rate-limit.enabled=${GATEWAY_RATE_LIMIT_ENABLED:true}
gateway.rate-limit.window-ms=${GATEWAY_RATE_LIMIT_WINDOW_MS:60000}
gateway.rate-limit.max-requests=${GATEWAY_RATE_LIMIT_MAX_REQUESTS:120}

# Logging
logging.level.root=INFO
logging.level.com.digiqual=INFO
