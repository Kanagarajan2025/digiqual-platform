# Server Configuration
server.port=${SERVER_PORT:8092}
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/digiqual_admin_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# Demo Data
app.seed.enabled=${APP_SEED_ENABLED:false}

# JWT Configuration
jwt.secret=${JWT_SECRET:replace-this-secret-with-a-secure-env-value}
jwt.expiration=86400000

# Application Name
spring.application.name=admin-service

# Logging
logging.level.root=INFO
logging.level.com.digiqual=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Mail (optional for credential notifications)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
