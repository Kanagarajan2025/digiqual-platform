# Server Configuration
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/digiqual_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# Demo Data
app.seed.enabled=${APP_SEED_ENABLED:false}

# JWT Configuration
jwt.secret=${JWT_SECRET:replace-this-secret-with-a-secure-env-value}
jwt.expiration=86400000

# Application Name
spring.application.name=DIGIQUAL Platform

# Logging
logging.level.root=INFO
logging.level.com.digiqual=INFO
