# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/digiqual_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=digiqual-super-secret-key-minimum-32-chars-change-in-prod
jwt.expiration=86400000

# Application Name
spring.application.name=DIGIQUAL Platform

# Logging
logging.level.root=INFO
logging.level.com.digiqual=DEBUG
